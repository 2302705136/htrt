<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轩辕黄帝祭拜大典</title>
    <!-- 引入 QRCode 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        /* 全局样式重置与基础设定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "LiSu", "STLiti", "SimSun", serif;
            background-color: #f4f1ea; /* 米色背景，营造纸张感 */
            color: #4a3b32;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 容器样式 */
        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 页面切换控制 */
        .page-section {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        .page-section.active {
            display: flex;
        }

        /* 标题样式 */
        h1, h2, h3 {
            font-weight: 900;
            color: #8B0000;
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        h2 {
            font-size: 1.5rem;
            color: #4a3b32;
        }

        p.desc {
            font-size: 1.1rem;
            color: #4a3b32;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
        }

        /* 二维码容器 */
        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 2px solid #8B0000;
        }

        /* 表单样式 */
        .form-group {
            width: 100%;
            margin-bottom: 20px;
            text-align: center;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #4a3b32;
            border-radius: 4px;
            background-color: #fff;
            font-family: "LiSu", "STLiti", "SimSun", serif;
            font-weight: 900;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #8B0000;
        }

        /* 按钮样式 */
        .btn {
            background-color: #8B0000;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background-color 0.3s, transform 0.1s;
            font-family: "LiSu", "STLiti", "SimSun", serif;
        }

        .btn:hover {
            background-color: #a50000;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background-color: #4a3b32;
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 1rem;
        }

        .btn-secondary:hover {
            background-color: #5c4a3f;
        }

        /* 错误提示 */
        .error-msg {
            color: #8B0000;
            font-weight: 900;
            margin-top: 10px;
            height: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .error-msg.visible {
            opacity: 1;
        }

        /* 抖动动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.5s;
            border-color: #8B0000 !important;
        }

        /* 淡入动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 证书容器 */
        .cert-wrapper {
            width: 100%;
            position: relative;
            background-color: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            /* 保持宽高比，适配不同屏幕 */
            aspect-ratio: 1080 / 1997;
            overflow: hidden;
            border: 4px solid #8B0000;
        }

        .cert-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .cert-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            padding: 80px 40px 60px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            font-family: "LiSu", "STLiti", "SimSun", serif;
        }

        .cert-title {
            font-size: 3.5rem;
            color: #000000;
            font-weight: 900;
            margin-bottom: 40px;
            letter-spacing: 15px;
            width: 100%;
            text-align: center;
            font-family: "SimHei", "Microsoft YaHei", sans-serif;
        }

        .cert-body {
            font-size: 1.4rem;
            line-height: 1.8;
            color: #000;
            font-weight: normal;
            text-align: center;
            width: 100%;
            max-width: 90%;
        }

        .cert-date {
            font-size: 1.2rem;
            color: #000;
            font-weight: normal;
            margin-top: 30px;
            align-self: flex-end;
            text-align: right;
            width: 100%;
            padding-right: 60px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .cert-title { font-size: 2.5rem; }
            .cert-body { font-size: 1.2rem; line-height: 2; }
            .cert-date { font-size: 1.2rem; }
            .cert-content { padding: 60px 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 1. 初始页面（二维码页面） -->
        <section id="page-qr" class="page-section active">
            <h1>轩辕黄帝祭拜大典</h1>
            <p class="desc">请扫描二维码填写姓名生成证书</p>
            <div id="qrcode"></div>
            <p style="font-size: 0.9rem; color: #666; margin-top: 10px;">（扫描二维码进入）</p>
        </section>

        <!-- 2. 姓名输入页面 -->
        <section id="page-input" class="page-section">
            <h1>填写姓名</h1>
            <h2>华夏儿女，敬祖爱国</h2>
            <div class="form-group">
                <input type="text" id="name-input" placeholder="请输入您的姓名" autocomplete="off">
                <div id="error-msg" class="error-msg">请输入姓名</div>
            </div>
            <button class="btn" id="submit-btn">生成证书</button>
            <button class="btn btn-secondary" onclick="goHome()">返回首页</button>
        </section>

        <!-- 3. 证书生成页面 -->
        <section id="page-cert" class="page-section">
            <div class="cert-wrapper">
                <!-- 背景图片 -->
                <img src="https://agent.qianwen.com/mos/14f8478a3ee14776b16ebb4f59c43219/c3db2dbca3a153ab7043ebc4f6003bf0" alt="证书背景" class="cert-bg">
                
                <!-- 证书内容叠加 -->
                <div class="cert-content">
                    <div class="cert-title">证  书</div>
                    <div class="cert-body">
                        <p>今有华夏儿女 <span id="cert-name">XXX</span>，秉持赤子之心，</p>
                        <p>谨依古礼，恭赴盛典。</p>
                        <p>共祈山河无恙、华夏繁昌、文脉永续、万代安康、为彰其敬祖爱国之忱。</p>
                        <p>特颁此证，永志纪念。</p>
                    </div>
                    <div class="cert-date" id="cert-date">2026年04月14日</div>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="goHome()">返回首页</button>
        </section>
    </div>

    <script>
        // 获取DOM元素
        const pageQr = document.getElementById('page-qr');
        const pageInput = document.getElementById('page-input');
        const pageCert = document.getElementById('page-cert');
        const nameInput = document.getElementById('name-input');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');
        const certNameSpan = document.getElementById('cert-name');
        const certDateDiv = document.getElementById('cert-date');

        // 路由处理函数
        function handleRouting() {
            const params = new URLSearchParams(window.location.search);
            const step = params.get('step');

            // 隐藏所有页面
            pageQr.classList.remove('active');
            pageInput.classList.remove('active');
            pageCert.classList.remove('active');

            if (step === 'input') {
                pageInput.classList.add('active');
            } else if (step === 'cert') {
                // 渲染证书数据
                const name = params.get('name') || 'XXX';
                const date = params.get('date') || '2026年04月14日';
                
                // 更新证书内容
                certNameSpan.textContent = name;
                certDateDiv.textContent = date;
                
                pageCert.classList.add('active');
            } else {
                // 默认显示二维码页面
                pageQr.classList.add('active');
                generateQRCode();
            }
        }

        // 生成二维码
        function generateQRCode() {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ''; // 清空之前的内容
            
            // 获取当前页面URL并添加 ?step=input 参数
            const currentUrl = window.location.href.split('?')[0];
            const targetUrl = `${currentUrl}?step=input`;

            // 使用 QRCode 库生成
            new QRCode(qrContainer, {
                text: targetUrl,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        // 返回首页
        function goHome() {
            // 清除URL参数，重新加载页面
            window.location.href = window.location.pathname;
        }

        // 提交表单处理
        submitBtn.addEventListener('click', function() {
            const name = nameInput.value.trim();

            // 验证输入
            if (!name) {
                // 显示错误
                errorMsg.classList.add('visible');
                // 添加抖动动画
                nameInput.classList.add('shake');
                
                // 动画结束后移除类，以便下次触发
                setTimeout(() => {
                    nameInput.classList.remove('shake');
                }, 500);
                return;
            }

            // 验证通过，生成日期
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const dateStr = `${year}年${month}月${day}日`;

            // 构建跳转URL
            const currentUrl = window.location.href.split('?')[0];
            const targetUrl = `${currentUrl}?step=cert&name=${encodeURIComponent(name)}&date=${encodeURIComponent(dateStr)}`;
            
            // 跳转
            window.location.href = targetUrl;
        });

        // 监听输入框，输入时隐藏错误提示
        nameInput.addEventListener('input', function() {
            if (errorMsg.classList.contains('visible')) {
                errorMsg.classList.remove('visible');
            }
        });

        // 页面加载完成后执行路由
        document.addEventListener('DOMContentLoaded', handleRouting);

        // 页面加载完成后立即生成二维码
        window.addEventListener('load', function() {
            if (window.location.search === '') {
                generateQRCode();
            }
        });
    </script>
</body>
</html>
